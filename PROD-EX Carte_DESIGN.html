document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"3aebc959-f65d-4c21-aa18-232f1eb1061a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"55bd2606-6cf1-46cf-94ce-85e418bba6f0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"178e4b9a-d175-4d27-8f10-977063eb2701\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  img{image-rendering:pixelated;image-rendering:crisp-edges;}\n  ::-webkit-scrollbar{width:10px;height:10px;}\n  ::-webkit-scrollbar-thumb{background:#4a4690;border:2px solid #15132b;}\n  ::-webkit-scrollbar-track{background:#15132b;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#13112a;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,0.02) 0 2px,transparent 2px 4px);color:#f4efe2;font-family:'VT323',monospace;padding:36px 30px 70px;\">\n  <div style=\"max-width:1120px;margin:0 auto;\">\n\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:6px;\">\n      <div style=\"width:30px;height:30px;background:#4a90e2;border:4px solid #0b0a1c;transform:rotate(45deg);box-shadow:inset -4px -4px 0 #2a5db0;\"><\u002Fdiv>\n      <div style=\"font-family:'Press Start 2P',monospace;font-size:18px;letter-spacing:1px;\">PROD-EX<\u002Fdiv>\n      <div style=\"font-family:'Press Start 2P',monospace;font-size:10px;color:#6b67c4;align-self:flex-end;padding-bottom:3px;\">CARTE &amp; FLUSSO<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NAV CONCEPT -->\n    <div style=\"font-family:'Press Start 2P',monospace;font-size:11px;color:#4a90e2;margin:22px 0 4px;\">FLUSSO · 3 MODALITÀ, UNA ALLA VOLTA<\u002Fdiv>\n    <div style=\"height:3px;background:#322e63;margin-bottom:16px;\"><\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;\">\n      <sc-for list=\"{{ modes }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <div style=\"{{ m.style }}\">\n          <div style=\"display:flex;align-items:center;gap:10px;\">\n            <div style=\"{{ m.iconStyle }}\">{{ m.icon }}<\u002Fdiv>\n            <div style=\"font-family:'Press Start 2P',monospace;font-size:11px;color:{{ m.titleColor }};\">{{ m.title }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'VT323',monospace;font-size:17px;color:#cdc9ee;line-height:1.12;margin-top:10px;\">{{ m.desc }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-family:'VT323',monospace;font-size:16px;color:#7d79ad;margin-bottom:36px;\">Pulsanti rapidi sempre presenti (in basso su mobile, in alto su desktop). Ogni modalità è una scena dedicata: accumuli col tempo reale, gestisci il deck, poi combatti.<\u002Fdiv>\n\n    <!-- CARDS -->\n    <div style=\"font-family:'Press Start 2P',monospace;font-size:11px;color:#4a90e2;margin-bottom:4px;\">CARTE · FRAME STILE TRADING CARD<\u002Fdiv>\n    <div style=\"height:3px;background:#322e63;margin-bottom:6px;\"><\u002Fdiv>\n    <div style=\"font-family:'VT323',monospace;font-size:17px;color:#9a96c4;margin-bottom:22px;max-width:680px;\">Cornice colorata per tipo · barra nome + costo a gemme · finestra-illustrazione con scena · riga-tipo con rarità · riquadro regole e flavor · box toughness o output Focus.<\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:26px;\">\n      <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"6\">\n        <div>\n          <div style=\"{{ c.frameStyle }}\">\n            <!-- title bar -->\n            <div style=\"{{ c.titleBarStyle }}\">\n              <div style=\"font-family:'VT323',monospace;font-size:19px;color:#fff;line-height:1;text-shadow:1px 1px 0 #0b0a1c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ c.name }}<\u002Fdiv>\n              <div style=\"display:flex;gap:3px;flex:none;\">\n                <sc-for list=\"{{ c.pips }}\" as=\"p\" hint-placeholder-count=\"2\">\n                  <span style=\"{{ p.style }}\"><\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <!-- art window -->\n            <div style=\"{{ c.artStyle }}\">\n              <div style=\"position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,0,0,0.10) 0 2px,transparent 2px 4px);\"><\u002Fdiv>\n              <div style=\"position:absolute;left:0;right:0;bottom:0;height:26px;background:{{ c.floor }};\"><\u002Fdiv>\n              <img src=\"{{ c.img }}\" style=\"width:130px;height:130px;position:relative;z-index:1;margin-bottom:6px;\">\n            <\u002Fdiv>\n            <!-- type line -->\n            <div style=\"{{ c.typeLineStyle }}\">\n              <span style=\"font-family:'VT323',monospace;font-size:15px;color:#f4ecd6;text-shadow:1px 1px 0 #0b0a1c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ c.typeText }}<\u002Fspan>\n              <span style=\"{{ c.rarityStyle }}\"><\u002Fspan>\n            <\u002Fdiv>\n            <!-- text box -->\n            <div style=\"{{ c.textBoxStyle }}\">\n              <div style=\"font-family:'VT323',monospace;font-size:16px;color:#2a2008;line-height:1.08;\">{{ c.rules }}<\u002Fdiv>\n              <div style=\"border-top:1px dashed #b39a5e;margin-top:5px;padding-top:4px;font-family:'VT323',monospace;font-size:14px;font-style:italic;color:#6a5a30;line-height:1.05;\">{{ c.flavor }}<\u002Fdiv>\n              <div style=\"{{ c.statStyle }}\"><span style=\"transform:{{ c.statRotate }};font-family:'Press Start 2P',monospace;font-size:12px;color:#fff;\">{{ c.stat }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- collector strip -->\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:0 3px;margin-top:3px;\">\n              <span style=\"font-family:'VT323',monospace;font-size:12px;color:{{ c.footColor }};\">{{ c.collector }}<\u002Fspan>\n              <span style=\"font-family:'VT323',monospace;font-size:12px;color:{{ c.footColor }};\">PROD-EX · {{ c.rarityName }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{}\">\nclass Component extends DCLogic {\n  renderVals(){\n    const ink='#0b0a1c';\n    const modeData=[\n      {icon:'⏱',title:'ACCUMULA',titleColor:'#7fb0ff',base:'#234080',light:'#4a90e2',\n       desc:'Cronometro libero, Pomodoro o import minuti offline. Il tempo reale → Focus → carte.'},\n      {icon:'🃏',title:'DECK',titleColor:'#f0c878',base:'#5a4a22',light:'#f0b429',\n       desc:'Sfoglia e modifica il mazzo. Qui vivono le carte, in grande.'},\n      {icon:'⚔',title:'COMBATTI',titleColor:'#ff9aa0',base:'#6a2730',light:'#e0555f',\n       desc:'La battaglia stile MTG Arena: schieri i task, spendi Focus, abbatti i nemici.'}\n    ];\n    const modes=modeData.map(m=>({\n      icon:m.icon,title:m.title,titleColor:m.titleColor,desc:m.desc,\n      style:{flex:'1',minWidth:'230px',background:'linear-gradient(180deg,'+m.base+',#1a1838)',border:'4px solid '+ink,boxShadow:'inset 0 0 0 2px '+m.light+', 0 5px 0 '+ink,padding:'16px'},\n      iconStyle:{width:'40px',height:'40px',flex:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',background:'#15132b',border:'3px solid '+ink,boxShadow:'inset 0 0 0 2px '+m.light}\n    }));\n\n    const pip=(n,color,deep)=>Array.from({length:n}).map(()=>({style:{width:'15px',height:'15px',background:color,border:'2px solid '+ink,transform:'rotate(45deg)',boxShadow:'inset -2px -2px 0 '+deep}}));\n\n    const rarity={\n      comune:{style:{width:'14px',height:'14px',flex:'none',borderRadius:'50%',background:'#9aa0b0',border:'2px solid '+ink,boxShadow:'inset -2px -2px 0 #5a606e'},name:'C'},\n      raro:{style:{width:'15px',height:'15px',flex:'none',background:'#f0b429',border:'2px solid '+ink,transform:'rotate(45deg)',boxShadow:'inset -2px -2px 0 #a8761a'},name:'R'},\n      mitico:{style:{width:'15px',height:'15px',flex:'none',background:'#ff7a4a',border:'2px solid '+ink,transform:'rotate(45deg)',boxShadow:'inset -2px -2px 0 #c2461f'},name:'M'}\n    };\n\n    // theme builder\n    const TH={\n      enemy:{base:'#a3343f',light:'#e0707a',deep:'#6a1f27',scene:'linear-gradient(180deg,#4a2028,#180a10)',floor:'#2a1218',foot:'#e7b3b8'},\n      focus:{base:'#2f63b5',light:'#6aa0e8',deep:'#1a3c72',scene:'linear-gradient(180deg,#2f63b5 0%,#16315a 70%,#10243f 100%)',floor:'#11233f',foot:'#bcd6ff'},\n      damage:{base:'#c2461f',light:'#ff8a52',deep:'#7a2810',scene:'linear-gradient(180deg,#9a4a22,#2a1208)',floor:'#2a1208',foot:'#f3c2a4'},\n      time:{base:'#6a44b5',light:'#a884ec',deep:'#3f2680',scene:'linear-gradient(180deg,#5b3aa6,#1f1440)',floor:'#1c1238',foot:'#d6c4ff'}\n    };\n    const W=246;\n    const frame=(t)=>({position:'relative',width:W+'px',background:'linear-gradient(160deg,'+t.light+' 0%,'+t.base+' 30%,'+t.deep+' 100%)',border:'4px solid '+ink,boxShadow:'inset 0 0 0 2px rgba(255,255,255,0.18), 0 7px 0 '+ink+', 0 9px 0 rgba(0,0,0,0.5)',padding:'7px',display:'flex',flexDirection:'column',gap:'5px'});\n    const titleBar=(t)=>({display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px',background:'linear-gradient(180deg,'+t.light+','+t.base+')',border:'2px solid '+ink,boxShadow:'inset 0 1px 0 rgba(255,255,255,0.3)',padding:'5px 8px'});\n    const art=(t)=>({position:'relative',height:'150px',overflow:'hidden',border:'3px solid '+ink,background:t.scene,display:'flex',alignItems:'flex-end',justifyContent:'center'});\n    const typeLine=(t)=>({display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px',background:'linear-gradient(180deg,'+t.base+','+t.deep+')',border:'2px solid '+ink,padding:'4px 8px',overflow:'hidden'});\n    const textBox=()=>({position:'relative',background:'#ead7a3',border:'2px solid '+ink,boxShadow:'inset 0 0 0 2px #cdb87f',padding:'8px 9px 11px',minHeight:'96px',overflow:'visible'});\n    const statBox=(t,shape)=>({position:'absolute',right:'-7px',bottom:'-10px',width:'34px',height:'30px',display:'flex',alignItems:'center',justifyContent:'center',background:t.base,border:'3px solid '+ink,boxShadow:'inset -3px -3px 0 '+t.deep,...(shape==='gem'?{transform:'rotate(45deg)',width:'30px',height:'30px'}:{})});\n\n    const defs=[\n      {key:'enemy',img:(window.__resources&&window.__resources.dragon)||'sprites/dragon.png',name:'Analisi CATIE',type:'Nemico — Drago',rar:'mitico',\n       rules:'Boss della giornata. Serve deep work vero per abbatterlo.',flavor:'Ti fissa dalla casella di posta. Sa di comandare lui, oggi.',\n       stat:'3',shape:'box',collector:'001/050'},\n      {key:'enemy',img:(window.__resources&&window.__resources.skeleton)||'sprites/skeleton.png',name:'Slide Rampino',type:'Nemico — Non-morto',rar:'comune',\n       rules:'Non si chiude da solo. Due colpi e cade.',flavor:'Risorge ad ogni \"ci aggiungiamo solo una slide\".',\n       stat:'2',shape:'box',collector:'014/050'},\n      {key:'focus',img:(window.__resources&&window.__resources.deepwork)||'sprites/deepwork.png',name:'Deep Work',type:'Risorsa — Fonte',rar:'raro',pips:0,\n       rules:'Tappa per generare 3 Focus. Fonte primaria di mana.',flavor:'Porta chiusa. Telefono in un altro continente.',\n       stat:'+3',shape:'gem',collector:'021/050'},\n      {key:'damage',img:(window.__resources&&window.__resources.pomodoro)||'sprites/pomodoro.png',name:'Pomodoro Strike',type:'Tecnica — Colpo',rar:'comune',pips:1,\n       rules:'Infliggi 1 danno a un nemico bersaglio.',flavor:'Venticinque minuti. Nessuna pietà.',\n       collector:'033/050'},\n      {key:'time',img:(window.__resources&&window.__resources.timeblock)||'sprites/timeblock.png',name:'Time Block',type:'Incantesimo — Aura',rar:'raro',pips:2,\n       rules:'Incanta un nemico: nessuna distrazione fino al completamento.',flavor:'Bloccato in agenda. Non si discute.',\n       collector:'040/050'},\n      {key:'damage',img:(window.__resources&&window.__resources.flow)||'sprites/flow.png',name:'Flow State',type:'Tecnica — Stato',rar:'mitico',pips:3,\n       rules:'Infliggi 3 danni a un nemico. Il colpo definitivo.',flavor:'Il tempo sparisce, resta solo il lavoro.',\n       collector:'050/050'}\n    ];\n\n    const cards=defs.map(d=>{\n      const t=TH[d.key];\n      const rr=rarity[d.rar];\n      const hasStat = d.stat!=null;\n      const pipColor = d.key==='focus' ? null : '#4a90e2';\n      const pips = (d.pips&&pipColor)?pip(d.pips,pipColor,'#2a5db0'):[];\n      return {\n        img:d.img,name:d.name,typeText:d.type,rules:d.rules,flavor:d.flavor,\n        collector:d.collector,rarityName:rr.name,footColor:t.foot,floor:t.floor,\n        frameStyle:frame(t),titleBarStyle:titleBar(t),artStyle:art(t),typeLineStyle:typeLine(t),\n        textBoxStyle:textBox(),rarityStyle:rr.style,pips,\n        stat:hasStat?d.stat:'',statStyle:hasStat?statBox(t,d.shape):{display:'none'},\n        statRotate:d.shape==='gem'?'rotate(-45deg)':'none'\n      };\n    });\n\n    return {modes,cards};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
